<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakhi Enterprises – Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --green:#2e7d32;
  --border:#c8e6c9;
  --light:#e8f5e9;
  --text:#1b5e20;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#f4f8f4;
  color:var(--text);
}
header{
  background:var(--green);
  color:#fff;
  padding:16px 24px;
  font-size:22px;
  font-weight:700;
}
.container{
  max-width:900px;
  margin:30px auto;
}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
h2{margin-top:0;color:var(--green);}
.address-box{
  background:var(--light);
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
  line-height:1.6;
}
.summary-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:15px;
  align-items:center;
  margin-bottom:15px;
}
.summary-total{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:800;
  margin-top:20px;
}
.btn{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:8px;
  background:var(--green);
  color:#fff;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}
.btn:hover{background:#1b5e20;}
.change-btn{
  background:#fff;
  color:var(--green);
  border:2px solid var(--green);
  margin-bottom:20px;
}

/* RESPONSIVE DESIGN */
@media (max-width:768px){
  header{padding:12px 16px;font-size:18px;}
  .container{margin:20px 16px;}
  .card{padding:16px;border-radius:8px;}
  h2{font-size:18px;margin-top:0;margin-bottom:12px;}
  .address-box{padding:12px;margin-bottom:8px;font-size:14px;}
  .summary-item{gap:10px;margin-bottom:12px;}
  .summary-total{font-size:18px;margin-top:16px;}
  .btn{padding:12px;font-size:15px;margin-top:16px;}
}

@media (max-width:600px){
  header{padding:10px 12px;font-size:16px;}
  .container{margin:15px 12px;}
  .card{padding:14px;border-radius:6px;}
  h2{font-size:16px;margin-bottom:10px;}
  .address-box{padding:10px;font-size:13px;line-height:1.4;}
  .summary-item{font-size:13px;gap:8px;}
  .summary-total{font-size:16px;margin-top:12px;}
  .btn{padding:10px;font-size:14px;margin-top:12px;}
}

@media (max-width:480px){
  header{padding:8px 10px;font-size:14px;}
  .container{margin:10px 8px;}
  .card{padding:10px;border:none;box-shadow:none;}
  h2{font-size:14px;margin-bottom:8px;}
  .address-box{padding:8px;font-size:12px;line-height:1.3;border-radius:4px;}
  .summary-item{font-size:12px;gap:6px;margin-bottom:8px;}
  .summary-total{font-size:14px;gap:10px;margin-top:10px;}
  .btn{padding:8px;font-size:12px;margin-top:10px;}
  input,select{font-size:14px!important;-webkit-appearance:none;}
}
</style>
</head>

<body>

<header>Sakhi Enterprises – Secure Checkout</header>

<div class="container">
  <div class="card">

    <h2>Delivery Address</h2>
    <div id="address-box" class="address-box">
      Loading address...
    </div>

    <button class="btn change-btn" onclick="changeAddress()">Change Address</button>
    <hr>
    <button class="btn change-btn" onclick="goToShop()">➕ Add More Products</button>

    <h2>Order Summary</h2>
    <div id="summary-items"></div>

    <div class="summary-total">
      <span>Total</span>
      <span id="summary-total">₹0</span>
    </div>

    <h2 style="margin-top:30px;">Payment Method</h2>
    <div style="background:var(--light);padding:20px;border-radius:8px;">
      <label style="display:flex;align-items:center;margin-bottom:15px;cursor:pointer;">
        <input type="radio" name="paymentMethod" value="ONLINE" checked style="margin-right:10px;width:18px;height:18px;cursor:pointer;">
        <span><strong>💳 Pay Online (Razorpay)</strong></span>
      </label>
      <p style="margin:0 0 15px 28px;font-size:13px;color:#666;">Instant payment, secure & fast. Credit/Debit cards, UPI, Wallets.</p>
      <label style="display:flex;align-items:center;cursor:pointer;">
        <input type="radio" name="paymentMethod" value="COD" style="margin-right:10px;width:18px;height:18px;cursor:pointer;">
        <span><strong>🚚 Cash on Delivery</strong></span>
      </label>
      <p style="margin:0 0 0 28px;font-size:13px;color:#666;">Pay when you receive your order. No prepayment needed.</p>
    </div>

    <button id="payBtn" class="btn">Place Order - ₹0</button>

  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const RAZORPAY_KEY = "rzp_test_S8l9sAf2Mc1cyv";
const BACKEND = window.location.origin;
let checkoutData = {};

// ================= LOAD CHECKOUT =================
async function loadCheckout() {
  console.log("Checkout loaded");

  const params = new URLSearchParams(window.location.search);
  const itemId = params.get("itemId");

  const checkoutType = sessionStorage.getItem("checkoutType") || "CART_CHECKOUT";
  console.log("Checkout Type:", checkoutType, "itemId:", itemId);

  // ✅ preserved checkout items (add more products flow)
  const bufferedItems = sessionStorage.getItem("checkoutItems");
  if (bufferedItems) {
    try {
      const items = JSON.parse(bufferedItems);
      if (Array.isArray(items) && items.length > 0) {
        checkoutData.items = items;
        let total = 0;
        let html = "";

        items.forEach((item) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          html += `
            <div class="summary-item">
              <div>
                <strong>${item.name}</strong><br>
                Qty: ${item.quantity}
              </div>
              <strong>₹${itemTotal.toLocaleString("en-IN")}</strong>
            </div>
          `;
        });

        document.getElementById("summary-items").innerHTML = html;
        document.getElementById("summary-total").textContent = "₹" + total.toLocaleString("en-IN");
        document.getElementById("payBtn").textContent = "Place Order - ₹" + total.toLocaleString("en-IN");

        checkoutData.total = total;

        await loadAddress();
        return;
      }
    } catch (e) {
      console.warn("Failed to parse checkoutItems", e);
    }
  }

  // ✅ DIRECT ORDER (Single Product from Product page)
  if (checkoutType === "DIRECT_ORDER") {
    const directOrder = sessionStorage.getItem("directOrder");
    if (!directOrder) {
      alert("No product selected. Redirecting to products...");
      window.location.href = "product.html";
      return;
    }

    const item = JSON.parse(directOrder);
    checkoutData.items = [item];
    checkoutData.total = item.price * item.quantity;

    document.getElementById("summary-items").innerHTML = `
      <div class="summary-item">
        <div>
          <strong>${item.name}</strong><br>
          Qty: ${item.quantity}
        </div>
        <strong>₹${item.price * item.quantity}</strong>
      </div>
    `;

    document.getElementById("summary-total").textContent = "₹" + checkoutData.total;
    document.getElementById("payBtn").textContent = "Place Order - ₹" + checkoutData.total;

    await loadAddress();
    return;
  }

  // ✅ CART ITEM CHECKOUT (explicit itemId parameter)
  if (itemId) {
    try {
      const res = await fetch(`${BACKEND}/cart/${itemId}`, {
        method: "GET",
        credentials: "include",
        headers: {
          "Authorization": "Bearer " + localStorage.getItem("token")
        }
      });

      if (!res.ok) {
        throw new Error(`Item fetch error: ${res.status}`);
      }

      const item = await res.json();
      checkoutData.items = [item];
      checkoutData.total = item.price * item.quantity;

      document.getElementById("summary-items").innerHTML = `
        <div class="summary-item">
          <div>
            <strong>${item.name}</strong><br>
            Qty: ${item.quantity}
          </div>
          <strong>₹${item.price * item.quantity}</strong>
        </div>
      `;
      document.getElementById("summary-total").textContent = "₹" + checkoutData.total;
      document.getElementById("payBtn").textContent = "Place Order - ₹" + checkoutData.total;

      await loadAddress();
      return;

    } catch (err) {
      console.error("Item checkout loading error:", err);
      alert("Failed to load selected item: " + err.message);
      window.location.href = "cart.html";
      return;
    }
  }

  // ✅ CART CHECKOUT (Multiple Products)
  if (checkoutType === "CART_CHECKOUT") {
    try {
      const res = await fetch(`${BACKEND}/cart`, {
        method: "GET",
        credentials: "include",
        headers: {
          "Authorization": "Bearer " + localStorage.getItem("token")
        }
      });

      if (!res.ok) {
        throw new Error(`API error: ${res.status}`);
      }

      const data = await res.json();
      console.log("Cart items received:", data.length, "items");

      if (!data || !Array.isArray(data) || data.length === 0) {
        alert("Your cart is empty!");
        window.location.href = "product.html";
        return;
      }

      let html = "";
      let total = 0;

      data.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        html += `
          <div class="summary-item">
            <div>
              <strong>${item.name}</strong><br>
              Qty: ${item.quantity}
            </div>
            <strong>₹${itemTotal.toLocaleString("en-IN")}</strong>
          </div>
        `;
      });

      document.getElementById("summary-items").innerHTML = html;
      document.getElementById("summary-total").textContent = "₹" + total.toLocaleString("en-IN");
      document.getElementById("payBtn").textContent = "Place Order - ₹" + total.toLocaleString("en-IN");

      checkoutData.total = total;
      checkoutData.items = data;

      await loadAddress();

    } catch (err) {
      console.error("Cart loading error:", err);
      alert("Failed to load cart: " + err.message);
      window.location.href = "product.html";
    }
    return;
  }

  // Default fallback (shouldn't reach here)
  alert("Invalid checkout type");
  window.location.href = "product.html";
}

// ================= LOAD ADDRESS =================
async function loadAddress() {
  const res = await fetch(`${BACKEND}/api/profile/profiledata`, {
    method: "GET",
    credentials: "include",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();
  checkoutData.address = data.address;

  if (!data.address) {
    document.getElementById("address-box").innerHTML = "No address found. Add in profile.";
  } else {
    const addr = data.address;
    document.getElementById("address-box").innerHTML = `
      <strong>${data.username}</strong><br>
      ${addr.fullName}<br>
      ${addr.street}, ${addr.city}<br>
      ${addr.state} - ${addr.pincode}<br>
      Phone: ${data.phone}
    `;
  }
}

// LOAD AFTER PAGE READY
document.addEventListener("DOMContentLoaded", loadCheckout);

// ================= PAYMENT =================

// ✅ Prepare items for backend (add totalPrice if missing)
function prepareItemsForOrder(items) {
  return items.map(item => ({
    name: item.name,
    quantity: item.quantity,
    totalPrice: item.totalPrice || (item.price * item.quantity),
    image: item.image || "",
    productId: item.productId || item._id || ""
  }));
}

document.getElementById("payBtn").addEventListener("click", async () => {
  if (!checkoutData.total || checkoutData.total <= 0) {
    alert("Cart is empty");
    return;
  }

  // Get selected payment method
  const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
  console.log("Selected payment method:", paymentMethod);

  if (!checkoutData.address) {
    alert("Please set delivery address first!");
    return;
  }

  try {
    // Prepare items with totalPrice
    const preparedItems = prepareItemsForOrder(checkoutData.items);

    // ========== COD Flow ==========
    if (paymentMethod === "COD") {
      const res = await fetch(`${BACKEND}/api/place-order`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.getItem("token")
        },
        credentials: "include",
        body: JSON.stringify({
          paymentMethod: "COD",
          address: checkoutData.address,
          items: preparedItems,
          totalAmount: checkoutData.total
        })
      });

      const data = await res.json();
      if (!data.success) {
        alert("Error: " + (data.message || "Failed to place order"));
        return;
      }

      alert("Order placed successfully with Cash on Delivery!");
      sessionStorage.removeItem("checkoutItems");
      sessionStorage.removeItem("checkoutType");
      sessionStorage.removeItem("directOrder");
      window.location.href = `success.html?orderId=${data.orderId}&method=COD`;
      return;
    }

    // ========== ONLINE Payment Flow ==========
    if (paymentMethod === "ONLINE") {
      const res = await fetch(`${BACKEND}/api/place-order`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.getItem("token")
        },
        credentials: "include",
        body: JSON.stringify({
          paymentMethod: "ONLINE",
          address: checkoutData.address,
          items: preparedItems,
          totalAmount: checkoutData.total
        })
      });

      const orderData = await res.json();
      if (!orderData.success) {
        alert("Error: " + (orderData.message || "Failed to create order"));
        return;
      }

      // Open Razorpay
      const options = {
        key: RAZORPAY_KEY,
        amount: orderData.razorpayOrder.amount,
        currency: orderData.razorpayOrder.currency,
        name: "Sakhi Enterprises",
        order_id: orderData.razorpayOrder.id,
        handler: async function (response) {
          // Verify payment
          const verifyRes = await fetch(`${BACKEND}/api/verify-payment`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + localStorage.getItem("token")
            },
            credentials: "include",
            body: JSON.stringify({
              orderId: orderData.orderId,
              razorpayPaymentId: response.razorpay_payment_id,
              razorpaySignature: response.razorpay_signature
            })
          });

          const verifyData = await verifyRes.json();
          if (verifyData.success) {
            alert("Payment successful! Order confirmed.");
            sessionStorage.removeItem("checkoutItems");
            sessionStorage.removeItem("checkoutType");
            sessionStorage.removeItem("directOrder");
            window.location.href = `success.html?orderId=${verifyData.orderId}&method=ONLINE`;
          } else {
            alert("Payment verification failed");
          }
        },
        prefill: {
          name: checkoutData.address.fullName,
          email: "",
          contact: ""
        },
        theme: {
          color: "#2e7d32"
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }
  } catch (error) {
    console.error("Checkout error:", error);
    alert("Error during checkout: " + error.message);
  }
});

// NAV
function changeAddress() {
  window.location.href = "/profile.html";
}
function goToShop() {
  // Preserve current checkout items so new additions append instead of overwriting
  if (checkoutData.items && checkoutData.items.length > 0) {
    sessionStorage.setItem("checkoutItems", JSON.stringify(checkoutData.items));
    sessionStorage.setItem("checkoutType", "DIRECT_ORDER");
  }

  window.location.href = "product.html";
}
</script>

</body>
</html>
