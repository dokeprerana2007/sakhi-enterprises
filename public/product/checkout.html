<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakhi Enterprises – Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --green:#2e7d32;
  --border:#c8e6c9;
  --light:#e8f5e9;
  --text:#1b5e20;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#f4f8f4;
  color:var(--text);
}
header{
  background:var(--green);
  color:#fff;
  padding:16px 24px;
  font-size:22px;
  font-weight:700;
}
.container{
  max-width:900px;
  margin:30px auto;
}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:25px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
h2{margin-top:0;color:var(--green);}
.address-box{
  background:var(--light);
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
  line-height:1.6;
}
.summary-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:15px;
  align-items:center;
  margin-bottom:15px;
}
.summary-total{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:800;
  margin-top:20px;
}
.btn{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:8px;
  background:var(--green);
  color:#fff;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}
.btn:hover{background:#1b5e20;}
.change-btn{
  background:#fff;
  color:var(--green);
  border:2px solid var(--green);
  margin-bottom:20px;
}
</style>
</head>

<body>

<header>Sakhi Enterprises – Secure Checkout</header>

<div class="container">
  <div class="card">

    <h2>Delivery Address</h2>
    <div id="address-box" class="address-box">
      Loading address...
    </div>

    <button class="btn change-btn" onclick="changeAddress()">Change Address</button>
    <hr>
    <button class="btn change-btn" onclick="goToShop()">➕ Add More Products</button>

    <h2>Order Summary</h2>
    <div id="summary-items"></div>

    <div class="summary-total">
      <span>Total</span>
      <span id="summary-total">₹0</span>
    </div>

    <button id="payBtn" class="btn">Pay ₹0</button>

  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const RAZORPAY_KEY = "rzp_test_S8l9sAf2Mc1cyv";
const BACKEND = window.location.origin;
let checkoutData = {};

// ================= LOAD CHECKOUT =================
async function loadCheckout() {
  console.log("Checkout loaded");

  const params = new URLSearchParams(window.location.search);
  const itemId = params.get("itemId");

  // SINGLE ITEM
  if (itemId) {
    const res = await fetch(`${BACKEND}/cart/${itemId}`, {
      method: "GET",
      credentials: "include",
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const item = await res.json();

    checkoutData.items = [item];
    checkoutData.total = item.price * item.quantity;

    document.getElementById("summary-items").innerHTML = `
      <div class="summary-item">
        <div>
          <strong>${item.name}</strong><br>
          Qty: ${item.quantity}
        </div>
        <strong>₹${item.price * item.quantity}</strong>
      </div>
    `;

    document.getElementById("summary-total").textContent = "₹" + checkoutData.total;
    document.getElementById("payBtn").textContent = "Pay ₹" + checkoutData.total;

    await loadAddress();
    return;
  }

  // FULL CART
  try {
    const res = await fetch(`${BACKEND}/cart`, {
      method: "GET",
      credentials: "include",
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();

    let html = "";
    let total = 0;

    data.forEach(item => {
      total += item.price * item.quantity;
      html += `
        <div class="summary-item">
          <div>
            <strong>${item.name}</strong>
            Qty: ${item.quantity}
          </div>
          <strong>₹${item.price * item.quantity}</strong>
        </div>
      `;
    });

    document.getElementById("summary-items").innerHTML = html;
    document.getElementById("summary-total").textContent = "₹" + total;
    document.getElementById("payBtn").textContent = "Pay ₹" + total;

    checkoutData.total = total;
    checkoutData.items = data;

    await loadAddress();

  } catch (err) {
    console.error(err);
    alert("Failed to load cart");
  }
}

// ================= LOAD ADDRESS =================
async function loadAddress() {
  const res = await fetch(`${BACKEND}/api/profile/profiledata`, {
    method: "GET",
    credentials: "include",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();
  checkoutData.address = data.address;

  if (!data.address) {
    document.getElementById("address-box").innerHTML = "No address found. Add in profile.";
  } else {
    const addr = data.address;
    document.getElementById("address-box").innerHTML = `
      <strong>${data.username}</strong><br>
      ${addr.fullName}<br>
      ${addr.street}, ${addr.city}<br>
      ${addr.state} - ${addr.pincode}<br>
      Phone: ${data.phone}
    `;
  }
}

// LOAD AFTER PAGE READY
document.addEventListener("DOMContentLoaded", loadCheckout);

// ================= PAYMENT =================
document.getElementById("payBtn").addEventListener("click", async () => {

  if (!checkoutData.total || checkoutData.total <= 0) {
    alert("Cart is empty");
    return;
  }

  const orderRes = await fetch(`${BACKEND}/api/payment/create-order`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ amount: checkoutData.total })
  });

  const order = await orderRes.json();

  const options = {
    key: RAZORPAY_KEY,
    amount: order.amount,
    currency: "INR",
    name: "Sakhi Enterprises",
    order_id: order.id,
    handler: async function (response) {

      await fetch(`${BACKEND}/api/payment/verify`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify(response)
      });

      await fetch(`${BACKEND}/order/place`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: checkoutData.items,
          address: checkoutData.address
        })
      });

      alert("Order Placed Successfully!");
      window.location.href = "success.html";
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
});

// NAV
function changeAddress() {
  window.location.href = "/profile.html";
}
function goToShop() {
  window.location.href = "product.html";
}
</script>

</body>
</html>
